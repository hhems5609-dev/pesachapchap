<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Video - Pesa ChapChap</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <style>
        .video-wrapper {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .timer-box {
            text-align: center;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" style="color: white; text-decoration: none; position: absolute; left: 15px;">← Back</a>
        <h1>Now Playing</h1>
    </div>

    <div class="container">
        <div class="video-wrapper">
            <iframe width="100%" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1" 
                frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="timer-box">
            Remaining: <span id="timer">30</span>s
        </div>

        <div class="balance-card">
            <p>Reward: <strong>KSH 5.00</strong></p>
            <p style="font-size: 0.8em; color: #666;">Do not close the page until the timer hits 0.</p>
        </div>
    </div>

    <script>
        let seconds = 30;
        const timerDisplay = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            seconds--;
            timerDisplay.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                alert("Task Complete! KSH 5.00 added to your account.");
                window.location.href = "/";
            }
        }, 1000);
    </script>
</body>
</html>
