<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch & Earn - Pesa ChapChap</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <style>
        body { background-color: #f4f4f9; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; }
        .video-container { width: 90%; max-width: 600px; margin: 20px auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .timer-display { font-size: 24px; font-weight: bold; color: #e74c3c; text-align: center; margin: 10px 0; }
        .reward-info { text-align: center; color: #2ecc71; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pesa ChapChap Player</h1>
    </div>
    <div class="video-container">
        <iframe width="100%" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
        <div class="timer-display">Wait: <span id="timer">30</span>s</div>
        <div class="reward-info">Reward: KSH 5.00</div>
    </div>

    <script>
        let timeLeft = 30;
        let timerElement = document.getElementById('timer');
        let countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                alert("Success! KSH 5.00 has been added to your balance.");
                window.location.href = "/";
            }
        }, 1000);
    </script>
</body>
</html>
