<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit | Pesa ChapChap</title>
    <style>
        body { background: #0d121c; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { font-size: 1.5rem; color: #ffee00; text-decoration: none; margin-right: 20px; }
        .mpesa-logo { background: #00e676; color: white; padding: 10px; border-radius: 10px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .input-group { background: #1a1a35; padding: 20px; border-radius: 15px; border: 1px solid #242a36; }
        input { width: 90%; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #0b0f16; color: white; font-size: 1.1rem; margin-top: 10px; }
        .deposit-btn { background: #ffee00; color: black; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: 800; font-size: 1.1rem; margin-top: 20px; cursor: pointer; }
        .info { font-size: 0.8rem; color: #8c8f94; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header">
    <a href="/" class="back-btn">←</a>
    <h2>DEPOSIT MONEY</h2>
</div>

<div class="mpesa-logo">M-PESA EXPRESS</div>

<div class="input-group">
    <label>Amount (Min 10 KES)</label><br>
    <input type="number" id="depAmount" placeholder="Enter Amount" value="100">
    <button class="deposit-btn" onclick="sendSTK()">DEPOSIT NOW</button>
</div>

<p class="info">Enter your M-Pesa PIN on the popup that will appear on your phone.</p>

<script>
    function sendSTK() {
        const amt = document.getElementById('depAmount').value;
        if(amt < 10) return alert("Minimum deposit is 10 KES");
        
        alert("STK Push Sent to your phone! Please enter your PIN.");
        
        // Simulating a successful deposit for now
        let currentBal = parseFloat(localStorage.getItem('pesa_balance') || 0);
        localStorage.setItem('pesa_balance', (currentBal + parseFloat(amt)).toFixed(2));
        
        setTimeout(() => {
            window.location.href = '/';
        }, 2000);
    }
</script>

</body>
</html>
