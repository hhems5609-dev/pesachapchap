<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesa ChapChap | Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0d121c;
            --bg-card: #141a26;
            --neon-green: #00e676;
            --border: #1f2533;
            --text-muted: #8e8fa3;
        }

        body { background: var(--bg-body); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 70px; }

        header { 
            background: #141a26; padding: 12px 15px; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; 
        }
        .bal-box { background: #ffee00; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; }

        .sports-nav { display: flex; overflow-x: auto; padding: 10px; gap: 20px; background: #141a26; border-bottom: 1px solid var(--border); }
        .sport-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; min-width: 55px; color: var(--text-muted); }
        .sport-item.active { color: var(--neon-green); font-weight: bold; }

        .banner { 
            background: linear-gradient(90deg, #00e676, #b2ff59); 
            margin: 12px; padding: 15px; border-radius: 10px; 
            color: #000; text-align: center; font-weight: 900; font-size: 0.85rem;
        }

        .odds-header { display: flex; padding: 10px 15px; font-size: 0.7rem; color: var(--text-muted); font-weight: bold; border-bottom: 1px solid var(--border); }
        .match-row { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        .match-meta { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
        .match-main { display: flex; align-items: center; }
        .match-teams { flex: 2; display: flex; flex-direction: column; gap: 2px; }
        .team-name { font-weight: 600; font-size: 0.9rem; }
        
        .odds-container { flex: 3; display: flex; gap: 8px; justify-content: flex-end; }
        .btn-odd { 
            background: #222834; border: 1px solid var(--border); color: #fff; 
            border-radius: 6px; width: 60px; height: 40px; display: flex; 
            align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; 
        }

        .market-link { color: var(--neon-green); font-size: 0.7rem; font-weight: 600; margin-top: 8px; display: block; text-align: right; text-decoration: none; }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #141a26; 
            display: flex; justify-content: space-around; padding: 12px 0; 
            border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--text-muted);
        }
    </style>
</head>
<body>

<header>
    <div style="font-size:1.3rem;">☰</div>
    <div style="font-weight:900; font-style:italic;">PESA<span style="color:var(--neon-green)">CHAPCHAP</span></div>
    <div class="bal-box">KES 0.00</div>
</header>

<div class="sports-nav">
    <div class="sport-item active">⚽<br>Soccer</div>
    <div class="sport-item">🚀<br>Aviator</div>
    <div class="sport-item">🏆<br>Jackpots</div>
    <div class="sport-item">🎰<br>Casino</div>
</div>

<div class="banner">🏆 OMOKA NA MIDWEEK 15M JACKPOT!</div>

<div class="odds-header">
    <div style="flex:2">Match</div>
    <div style="flex:3; display:flex; justify-content:flex-end; gap:50px; padding-right:15px;"><span>1</span><span>X</span><span>2</span></div>
</div>

<div id="matchContainer"></div>

<nav class="bottom-nav">
    <div style="color:var(--neon-green)">🏠<br>Home</div>
    <div>📡<br>Live</div>
    <div>🧾<br>My Bets</div>
    <div>👤<br>Account</div>
</nav>

<script>
    function renderMatches() {
        const container = document.getElementById('matchContainer');
        const games = [
            { t1: 'Brazil', t2: 'Croatia', o1: '1.78', oX: '3.90', o2: '4.10', time: 'Today, 21:00', m: '78' },
            { t1: 'Mexico', t2: 'Belgium', o1: '3.60', oX: '3.50', o2: '2.02', time: 'Today, 22:30', m: '84' },
            { t1: 'USA', t2: 'Portugal', o1: '4.70', oX: '4.20', o2: '1.63', time: 'Tomorrow, 19:00', m: '102' }
        ];

        games.forEach(g => {
            container.innerHTML += `
                <div class="match-row">
                    <div class="match-meta"><span>⚽ Soccer • International</span> <span>${g.time}</span></div>
                    <div class="match-main">
                        <div class="match-teams"><span class="team-name">${g.t1}</span><span class="team-name">${g.t2}</span></div>
                        <div class="odds-container">
                            <div class="btn-odd">${g.o1}</div>
                            <div class="btn-odd">${g.oX}</div>
                            <div class="btn-odd">${g.o2}</div>
                        </div>
                    </div>
                    <a href="#" class="market-link">+${g.m} Markets</a>
                </div>`;
        });
    }
    renderMatches();
</script>
</body>
</html>
