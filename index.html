<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesa ChapChap | Pro Sports</title>
    <style>
        :root { --bg: #0d121c; --primary: #ffee00; --text: #fff; --card: #1a1e29; --border: #242a36; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        header { background: #0b0f16; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.2rem; }
        .logo span { color: var(--primary); }
        .bal { background: var(--primary); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .match-card { padding: 15px; border-bottom: 1px solid var(--border); }
        .match-info { font-size: 0.75rem; color: #888; margin-bottom: 5px; }
        .teams { font-weight: bold; font-size: 1rem; margin-bottom: 10px; line-height: 1.3; }
        .odds-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .odd-btn { background: #242a36; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; }
        .odd-btn:active { background: var(--primary); color: #000; }
        #betslip { position: fixed; bottom: 70px; left: 5%; width: 90%; background: #ffee00; color: #000; padding: 15px; border-radius: 10px; display: none; flex-direction: column; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); z-index: 1000; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0b0f16; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); }
        .nav-item { color: #888; text-decoration: none; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo">PESA<span>CHAPCHAP</span></div>
    <div class="bal">KES <span id="displayBal">0.00</span></div>
</header>

<div id="matchList"></div>

<div id="betslip">
    <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px;">
        <span id="slipMatch">Match</span>
        <span id="slipOdd">0.00</span>
    </div>
    <input type="number" id="stake" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Stake (Min 10)" oninput="updateWin()">
    <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px;">
        <span>Win:</span>
        <span id="posWin">0.00</span>
    </div>
    <button onclick="placeBet()" style="background:#000; color:#fff; border:none; padding:12px; border-radius:5px; font-weight:bold; width:100%;">PLACE BET</button>
</div>

<div class="nav">
    <a href="/" class="nav-item">🏠<br>Home</a>
    <a href="/play" class="nav-item">🚀<br>Aviator</a>
    <a href="/deposit" class="nav-item">💳<br>Deposit</a>
    <a href="/admin" class="nav-item">👤<br>Account</a>
</div>

<script>
    // FIX: Initializing balance correctly to avoid NaN
    let rawBal = localStorage.getItem('pesa_balance');
    let currentBalance = (rawBal === null || rawBal === "NaN") ? 0.00 : parseFloat(rawBal);
    document.getElementById('displayBal').innerText = currentBalance.toFixed(2);

    const matches = [
        { teams: "Chelsea vs Liverpool", time: "Today, 20:00", odds: [2.50, 3.20, 2.80] },
        { teams: "Arsenal vs Man City", time: "Today, 22:30", odds: [3.10, 3.50, 2.10] },
        { teams: "Real Madrid vs Barcelona", time: "Tomorrow, 21:00", odds: [1.90, 3.80, 4.20] },
        { teams: "Gor Mahia vs AFC Leopards", time: "Sunday, 15:00", odds: [1.75, 2.90, 5.00] },
        { teams: "Bayern vs Dortmund", time: "Tomorrow, 19:30", odds: [1.50, 4.50, 6.00] },
        { teams: "PSG vs Marseille", time: "Monday, 21:45", odds: [1.40, 4.80, 7.50] },
        { teams: "Juventus vs AC Milan", time: "Sunday, 20:45", odds: [2.20, 3.10, 3.30] }
    ];

    let selectedOdd = 0;
    function loadMatches() {
        const container = document.getElementById('matchList');
        matches.forEach(m => {
            container.innerHTML += `
                <div class="match-card">
                    <div class="match-info">⚽ International • ${m.time}</div>
                    <div class="teams">${m.teams.replace(' vs ', '<br>')}</div>
                    <div class="odds-row">
                        <div class="odd-btn" onclick="openSlip('${m.teams}', ${m.odds[0]})">1<br>${m.odds[0]}</div>
                        <div class="odd-btn" onclick="openSlip('${m.teams}', ${m.odds[1]})">X<br>${m.odds[1]}</div>
                        <div class="odd-btn" onclick="openSlip('${m.teams}', ${m.odds[2]})">2<br>${m.odds[2]}</div>
                    </div>
                </div>`;
        });
    }

    function openSlip(teams, odd) {
        selectedOdd = odd;
        document.getElementById('slipMatch').innerText = teams;
        document.getElementById('slipOdd').innerText = odd;
        document.getElementById('betslip').style.display = 'flex';
        updateWin();
    }

    function updateWin() {
        const stake = document.getElementById('stake').value || 0;
        document.getElementById('posWin').innerText = (stake * selectedOdd).toFixed(2);
    }

    function placeBet() {
        const stake = parseFloat(document.getElementById('stake').value);
        if (stake > currentBalance) return alert("Insufficient Balance!");
        if (stake < 10) return alert("Min bet KES 10");
        currentBalance -= stake;
        localStorage.setItem('pesa_balance', currentBalance.toFixed(2));
        document.getElementById('displayBal').innerText = currentBalance.toFixed(2);
        alert("Bet Placed!");
        document.getElementById('betslip').style.display = 'none';
    }
    loadMatches();
</script>
</body>
</html>
