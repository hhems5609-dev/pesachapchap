<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesa ChapChap | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0d121c;
            --bg-card: #141a26;
            --neon-green: #00e676;
            --border: #1f2533;
            --text-muted: #8e8fa3;
            --dash-width: 280px;
        }

        body { background: var(--bg-body); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* SIDEBAR */
        #dashboard {
            position: fixed; top: 0; left: calc(-1 * var(--dash-width)); width: var(--dash-width);
            height: 100%; background: #1c222e; z-index: 3000; transition: 0.3s;
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        #dashboard.active { left: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 2500; }
        .dash-item { padding: 15px 20px; color: #fff; text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--border); cursor: pointer; }

        /* HEADER */
        header { background: #141a26; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .bal-box { background: #ffee00; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; }

        /* CRASH GAME LAYER */
        #crash-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-body); z-index: 4000; flex-direction: column;
        }
        .crash-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .multiplier { font-size: 5rem; font-weight: 900; color: var(--neon-green); transition: 0.1s; }
        .crash-controls { padding: 30px; background: #141a26; border-top: 1px solid var(--border); }
        .btn-play { width: 100%; padding: 20px; border-radius: 12px; border: none; font-weight: 900; font-size: 1.2rem; background: var(--neon-green); color: #000; }
        .btn-play.active { background: #ff9800; color: #fff; }

        /* MATCH LIST */
        .match-row { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        .match-main { display: flex; align-items: center; margin-top: 5px; }
        .match-teams { flex: 2; display: flex; flex-direction: column; }
        .team-name { font-weight: 600; font-size: 0.95rem; }
        .odds-container { flex: 3; display: flex; gap: 8px; justify-content: flex-end; }
        .btn-odd { background: #222834; border: 1px solid var(--border); color: #fff; border-radius: 6px; width: 62px; height: 42px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleDash()"></div>

<div id="dashboard">
    <div style="padding:20px; font-weight:900;">PESA<span style="color:var(--neon-green)">CHAPCHAP</span></div>
    <div onclick="showSports()" class="dash-item">🏠 Sports Home</div>
    <div onclick="openCrash()" class="dash-item">📈 Crash Game</div>
    <div class="dash-item">🏆 Jackpots</div>
</div>

<div id="main-content">
    <header>
        <div onclick="toggleDash()" style="font-size:1.5rem; cursor:pointer;">☰</div>
        <div style="font-weight:900; font-style:italic;">PESA<span style="color:var(--neon-green)">CHAPCHAP</span></div>
        <div class="bal-box">KES <span id="balance">1000.00</span></div>
    </header>

    <div style="padding:15px; background:#141a26; border-bottom:1px solid var(--border); font-weight:900; color:var(--neon-green)">UPCOMING HIGHLIGHTS</div>
    <div id="matchContainer"></div>
</div>

<div id="crash-screen">
    <div style="padding:15px; display:flex; justify-content:space-between; border-bottom:1px solid var(--border);">
        <div onclick="showSports()" style="cursor:pointer;">✕ Exit</div>
        <div style="font-weight:900;">OMOKA CRASH</div>
        <div id="crash-bal">KES 1000.00</div>
    </div>
    <div class="crash-display">
        <div id="mult-val" class="multiplier">1.00x</div>
        <div id="status-txt" style="color:var(--text-muted); margin-top:10px;">Ready to Omoka?</div>
    </div>
    <div class="crash-controls">
        <button id="actionBtn" class="btn-play" onclick="handleGame()">BET KES 100</button>
    </div>
</div>

<script>
    let bal = 1000;
    let playing = false;
    let currentMult = 1.0;
    let timer;

    function toggleDash() {
        const d = document.getElementById('dashboard');
        const o = document.getElementById('overlay');
        d.classList.toggle('active');
        o.style.display = d.classList.contains('active') ? 'block' : 'none';
    }

    function openCrash() { document.getElementById('crash-screen').style.display = 'flex'; toggleDash(); }
    function showSports() { document.getElementById('crash-screen').style.display = 'none'; }

    function handleGame() {
        const btn = document.getElementById('actionBtn');
        const mText = document.getElementById('mult-val');
        
        if (!playing) {
            if (bal < 100) return alert("Insufficient Balance");
            bal -= 100;
            updateUI();
            playing = true;
            currentMult = 1.0;
            mText.style.color = 'var(--neon-green)';
            btn.innerText = "CASH OUT";
            btn.classList.add('active');
            
            timer = setInterval(() => {
                currentMult += 0.02;
                mText.innerText = currentMult.toFixed(2) + "x";
                if (Math.random() < 0.015) doCrash();
            }, 60);
        } else {
            let win = 100 * currentMult;
            bal += win;
            alert("WIN! KES " + win.toFixed(2));
            resetGame();
        }
    }

    function doCrash() {
        clearInterval(timer);
        const mText = document.getElementById('mult-val');
        mText.innerText = "CRASHED!";
        mText.style.color = "red";
        setTimeout(resetGame, 2000);
    }

    function resetGame() {
        playing = false;
        clearInterval(timer);
        document.getElementById('actionBtn').innerText = "BET KES 100";
        document.getElementById('actionBtn').classList.remove('active');
        updateUI();
    }

    function updateUI() {
        document.getElementById('balance').innerText = bal.toFixed(2);
        document.getElementById('crash-bal').innerText = "KES " + bal.toFixed(2);
    }

    function render() {
        const c = document.getElementById('matchContainer');
        const matches = [
            {t1:'Arsenal', t2:'Chelsea', o1:'1.85', oX:'3.40', o2:'4.10'},
            {t1:'Man City', t2:'Real Madrid', o1:'2.10', oX:'3.10', o2:'3.20'}
        ];
        matches.forEach(m => {
            c.innerHTML += `<div class="match-row">
                <div style="font-size:0.65rem; color:var(--text-muted);">Soccer • Today</div>
                <div class="match-main">
                    <div class="match-teams"><span class="team-name">${m.t1}</span><span class="team-name">${m.t2}</span></div>
                    <div class="odds-container"><div class="btn-odd">${m.o1}</div><div class="btn-odd">${m.oX}</div><div class="btn-odd">${m.o2}</div></div>
                </div>
            </div>`;
        });
    }
    render();
</script>
</body>
</html>
