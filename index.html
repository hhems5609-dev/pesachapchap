<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesa ChapChap | Dashboard</title>
    <style>
        :root {
            --bg-deep: #0d121c;
            --bg-card: #141a26;
            --neon-green: #00e676;
            --text-main: #ffffff;
            --text-muted: #8e8fa3;
            --border: #1f2533;
            --dash-bg: #1c222e;
        }

        body { background: var(--bg-deep); color: var(--text-main); font-family: sans-serif; margin: 0; overflow-x: hidden; }

        /* HEADER */
        header { 
            background: #0b0f16; padding: 10px 15px; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; 
        }
        .menu-trigger { font-size: 1.5rem; cursor: pointer; color: var(--text-main); }
        .logo-pesa { font-weight: 900; color: #fff; font-style: italic; }
        .logo-chap { color: var(--neon-green); font-weight: 900; font-style: italic; }

        /* DASHBOARD / SIDEBAR */
        #dashboard {
            position: fixed; top: 0; left: -100%; width: 80%; height: 100%;
            background: var(--dash-bg); z-index: 2000; transition: 0.3s;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5); overflow-y: auto;
        }
        #dashboard.active { left: 0; }
        .dash-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .close-btn { font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }

        /* DASHBOARD LISTINGS */
        .dash-list { list-style: none; padding: 0; margin: 0; }
        .dash-item {
            display: flex; align-items: center; padding: 18px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            text-decoration: none; color: var(--text-main); font-weight: bold; font-size: 0.95rem;
        }
        .dash-item:active { background: rgba(0, 230, 118, 0.1); }
        .dash-icon { margin-right: 15px; font-size: 1.2rem; width: 25px; text-align: center; }
        .badge-new { background: #ffee00; color: #000; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-left: 10px; }

        /* OVERLAY */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 1500;
        }

        /* MAIN CONTENT PLACEHOLDER */
        .main-content { padding: 20px; text-align: center; color: var(--text-muted); }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleDash()"></div>

<div id="dashboard">
    <div class="dash-header">
        <div style="font-weight:900;">PESA<span style="color:var(--neon-green)">CHAPCHAP</span></div>
        <div class="close-btn" onclick="toggleDash()">✕</div>
    </div>
    <nav class="dash-list">
        <a href="#" class="dash-item"><span class="dash-icon">🏟️</span> Prematch</a>
        <a href="#" class="dash-item"><span class="dash-icon">📡</span> Live Games</a>
        <a href="#" class="dash-item"><span class="dash-icon">🏆</span> Jackpots</a>
        <a href="/play" class="dash-item"><span class="dash-icon">🚀</span> Aviator</a>
        <a href="#" class="dash-item"><span class="dash-icon">🎰</span> Casino Games</a>
        <a href="#" class="dash-item"><span class="dash-icon">🏇</span> Virtuals</a>
        <a href="#" class="dash-item"><span class="dash-icon">🎁</span> Promotions <span class="badge-new">NEW</span></a>
    </nav>
</div>

<header>
    <div class="menu-trigger" onclick="toggleDash()">☰</div>
    <div style="font-size:1.1rem;"><span class="logo-pesa">PESA</span><span class="logo-chap">CHAPCHAP</span></div>
    <div style="background:#ffee00; color:#000; padding:4px 10px; border-radius:20px; font-weight:800; font-size:0.8rem;">
        KES <span id="userBal">0.00</span>
    </div>
</header>

<div class="main-content">
    <div style="background:linear-gradient(90deg, #00e676, #b2ff59); color:#000; padding:30px; border-radius:12px; font-weight:900; margin-bottom:20px;">
        OMOKA NA MIDWEEK<br>15 MILLION JACKPOT!
    </div>
    <p>Click the ☰ menu to see your new Dashboard listings!</p>
</div>

<script>
    function toggleDash() {
        const dash = document.getElementById('dashboard');
        const overlay = document.getElementById('overlay');
        dash.classList.toggle('active');
        overlay.style.display = dash.classList.contains('active') ? 'block' : 'none';
    }

    // Load Balance
    let rawBal = localStorage.getItem('pesa_balance');
    document.getElementById('userBal').innerText = (rawBal === null || rawBal === "NaN") ? "0.00" : parseFloat(rawBal).toFixed(2);
</script>
</body>
</html>
