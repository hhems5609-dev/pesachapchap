<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesa ChapChap | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0d121c;
            --neon-green: #00e676;
            --text-main: #ffffff;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-deep); overflow: hidden; }

        /* STYLISH OPENING PAGE (SPLASH) */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a2233 0%, #0d121c 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-container { text-align: center; animation: zoomIn 1.2s ease-out; }
        
        .splash-logo {
            font-size: 3rem; font-weight: 900; letter-spacing: -2px; font-style: italic;
            color: #fff; text-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
        }
        .splash-logo span { color: var(--neon-green); }

        .tagline {
            color: #8e8fa3; font-size: 0.9rem; margin-top: 10px; 
            letter-spacing: 3px; text-transform: uppercase; opacity: 0;
            animation: fadeIn 0.5s ease-out 0.8s forwards;
        }

        .loader-bar {
            width: 150px; height: 3px; background: rgba(255,255,255,0.1);
            margin-top: 30px; border-radius: 10px; overflow: hidden;
        }
        .loader-progress {
            width: 0%; height: 100%; background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            animation: load 2.5s ease-in-out forwards;
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes load { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }

        /* HIDE CONTENT INITIALLY */
        #main-app { opacity: 0; visibility: hidden; transition: opacity 1s ease; }
        #main-app.show { opacity: 1; visibility: visible; overflow-y: auto; height: 100%; }

        /* RE-USING YOUR STYLES BELOW */
        header { background: #141a26; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f2533; }
        .bal-box { background: #ffee00; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="logo-container">
        <div class="splash-logo">PESA<span>CHAPCHAP</span></div>
        <div class="tagline">Win Fast. Win Big.</div>
    </div>
    <div class="loader-bar">
        <div class="loader-progress"></div>
    </div>
</div>

<div id="main-app">
    <header>
        <div style="font-size: 1.5rem; color: #fff;">☰</div>
        <div style="font-weight:900; color: #fff; font-style: italic;">PESA<span style="color:var(--neon-green)">CHAPCHAP</span></div>
        <div class="bal-box">KES 0.00</div>
    </header>
    
    <div style="padding: 20px; color: #fff; text-align: center;">
        <h2 style="color: var(--neon-green);">Karibu Tena!</h2>
        <p style="color: #8e8fa3;">Loading the latest odds for you...</p>
        <div id="matchContainer"></div>
    </div>
</div>

<script>
    // Reveal App after opening page animation
    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            const app = document.getElementById('main-app');
            
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                app.classList.add('show');
                document.body.style.overflow = 'auto';
            }, 800);
        }, 2800); // Progress bar finishes at 2.5s, app reveals at 2.8s
    });

    // Your existing match generation logic
    function generateMatches() {
        const container = document.getElementById('matchContainer');
        const teams = ["Arsenal", "Man City", "Real Madrid", "Liverpool"];
        for (let i = 0; i < 4; i++) {
            container.innerHTML += `
                <div style="background:#141a26; margin-bottom:10px; padding:15px; border-radius:10px; border:1px solid #1f2533; text-align:left;">
                    <div style="font-size:0.8rem; color:#8e8fa3; margin-bottom:5px;">Today, 21:00</div>
                    <div style="font-weight:600;">${teams[i]} vs Chelsea</div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button style="flex:1; background:#222834; border:1px solid #1f2533; color:#fff; padding:10px; border-radius:5px;">1.85</button>
                        <button style="flex:1; background:#222834; border:1px solid #1f2533; color:#fff; padding:10px; border-radius:5px;">3.40</button>
                        <button style="flex:1; background:#222834; border:1px solid #1f2533; color:#fff; padding:10px; border-radius:5px;">4.10</button>
                    </div>
                </div>`;
        }
    }
    generateMatches();
</script>
</body>
</html>
