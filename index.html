<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesa ChapChap | Pro Dashboard</title>
    <style>
        :root {
            --bg-deep: #0d121c;
            --bg-card: #141a26;
            --neon-green: #00e676;
            --text-main: #ffffff;
            --text-muted: #8e8fa3;
            --border: #1f2533;
            --dash-bg: #1c222e;
        }

        /* Light Theme Variables */
        .light-theme {
            --bg-deep: #f4f4f7;
            --bg-card: #ffffff;
            --text-main: #1a1e29;
            --text-muted: #666;
            --border: #e0e0e0;
            --dash-bg: #ffffff;
        }

        body { background: var(--bg-deep); color: var(--text-main); font-family: sans-serif; margin: 0; transition: 0.3s; }

        /* DASHBOARD STYLES */
        #dashboard {
            position: fixed; top: 0; left: -100%; width: 85%; height: 100%;
            background: var(--dash-bg); z-index: 2000; transition: 0.3s;
            display: flex; flex-direction: column;
        }
        #dashboard.active { left: 0; }
        
        .dash-scroll { flex: 1; overflow-y: auto; }
        
        .dash-item {
            display: flex; align-items: center; padding: 15px 20px;
            text-decoration: none; color: var(--text-main); font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        /* PREFERENCES SECTION */
        .pref-section {
            padding: 20px; background: rgba(0,0,0,0.05);
            border-top: 1px solid var(--border);
        }
        .pref-title { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; font-weight: bold; }
        
        .pref-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .pref-label { font-size: 0.9rem; font-weight: bold; }
        .pref-sub { font-size: 0.7rem; color: var(--text-muted); display: block; }

        /* TOGGLE SWITCH */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--neon-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        header { background: var(--bg-card); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }
    </style>
</head>
<body id="mainBody">

<div id="overlay" onclick="toggleDash()"></div>

<div id="dashboard">
    <div style="padding: 20px; font-weight: 900; border-bottom: 1px solid var(--border);">PESACHAPCHAP</div>
    
    <div class="dash-scroll">
        <a href="#" class="dash-item">🏟️ Prematch</a>
        <a href="#" class="dash-item">📡 Live Games</a>
        <a href="/play" class="dash-item">🚀 Aviator</a>
        <a href="#" class="dash-item">🎰 Casino</a>
    </div>

    <div class="pref-section">
        <div class="pref-title">Preferences</div>
        
        <div class="pref-row">
            <div>
                <span class="pref-label">Display</span>
                <span class="pref-sub">Switch between light and dark theme</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="themeToggle" onclick="toggleTheme()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="pref-row">
            <div>
                <span class="pref-label">Data Saver</span>
                <span class="pref-sub">Turn on to save data bundles</span>
            </div>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>
</div>

<header>
    <div onclick="toggleDash()" style="font-size:1.5rem;">☰</div>
    <div style="font-weight:900; color:var(--neon-green);">PESA CHAPCHAP</div>
    <div style="background:#ffee00; color:#000; padding:4px 10px; border-radius:20px; font-weight:800; font-size:0.8rem;">KES 0.00</div>
</header>

<div style="padding: 20px; text-align:center;">
    <h3>Welcome to the Pro Dashboard</h3>
    <p>Open the menu to try the Light/Dark mode switch!</p>
</div>

<script>
    function toggleDash() {
        const dash = document.getElementById('dashboard');
        const overlay = document.getElementById('overlay');
        dash.classList.toggle('active');
        overlay.style.display = dash.classList.contains('active') ? 'block' : 'none';
    }

    function toggleTheme() {
        const body = document.getElementById('mainBody');
        body.classList.toggle('light-theme');
        const isLight = body.classList.contains('light-theme');
        localStorage.setItem('pesa_theme', isLight ? 'light' : 'dark');
    }

    // Load saved theme
    if (localStorage.getItem('pesa_theme') === 'light') {
        document.getElementById('mainBody').classList.add('light-theme');
        document.getElementById('themeToggle').checked = true;
    }
</script>
</body>
</html>
