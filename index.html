<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesa ChapChap | Sports & Casino</title>
    <style>
        :root { --bg: #0b011d; --card: #1a1a35; --acc: #00e676; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { background: #120129; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2a2a50; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; color: var(--acc); font-size: 1.2rem; }
        .balance-box { background: #2a2a50; padding: 5px 15px; border-radius: 20px; font-weight: bold; border: 1px solid var(--acc); }
        
        .banner { width: 100%; height: 150px; background: linear-gradient(45deg, #6200ea, #00e676); display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; font-size: 1.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .section-title { padding: 20px 15px 10px; font-size: 1.1rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .game-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2a2a50; transition: 0.3s; text-decoration: none; color: white; }
        .game-card:active { transform: scale(0.95); }
        .game-img { width: 100%; height: 100px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .game-info { padding: 10px; text-align: center; font-weight: bold; }
        
        footer { padding: 40px 20px; text-align: center; color: #666; font-size: 0.8rem; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #120129; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2a2a50; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

<header>
    <div class="logo">PESA CHAPCHAP</div>
    <div class="balance-box">KES <span id="userBal">0.00</span></div>
</header>

<div class="banner">
    50% WELCOME BONUS<br>ON FIRST DEPOSIT!
</div>

<div class="section-title">Popular Games</div>
<div class="game-grid">
    <a href="/play" class="game-card">
        <div class="game-img" style="background: #2a0a4d;">🚀</div>
        <div class="game-info">Aviator / Crash</div>

    <a href="/sports" class="game-card">
    <div class="game-img" style="background: #0a3d2a;">⚽</div>
    <div class="game-info">Sports Betting</div>
</a>

    <a href="#" class="game-card" onclick="alert('Casino coming soon!')">
        <div class="game-img" style="background: #4d0a0a;">🎰</div>        <div class="game-info">Casino Slots</div>
    </a>
    <a href="#" class="game-card" onclick="alert('Virtuals coming soon!')">
        <div class="game-img" style="background: #3d3d0a;">🏇</div>
        <div class="game-info">Virtual Racing</div>
    </a>
</div>

<div class="nav-bar">
    <a href="/" class="nav-item">🏠<br>Home</a>
    <a href="/play" class="nav-item">🚀<br>Crash</a>
    <a href="#" class="nav-item">💳<br>Deposit</a>
    <a href="/admin" class="nav-item">🛡️<br>Account</a>
</div>

<script>
    // Load balance from storage
    document.getElementById('userBal').innerText = localStorage.getItem('pesa_balance') || '0.00';
</script>

</body>
</html>
