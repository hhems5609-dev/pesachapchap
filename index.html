<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesa ChapChap | Pro Betting & Aviator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0d121c;
            --bg-card: #141a26;
            --neon-green: #00e676;
            --neon-red: #ff3d00;
            --border: #1f2533;
            --text-muted: #8e8fa3;
            --dash-width: 280px;
        }

        body { background: var(--bg-body); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* SIDEBAR DASHBOARD */
        #dashboard {
            position: fixed; top: 0; left: calc(-1 * var(--dash-width)); width: var(--dash-width);
            height: 100%; background: #1c222e; z-index: 4000; transition: 0.3s cubic-bezier(0, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        #dashboard.active { left: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 3500; }

        .dash-header { padding: 20px; font-weight: 900; border-bottom: 1px solid var(--border); font-size: 1.2rem; display: flex; justify-content: space-between; }
        .dash-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; text-decoration: none; color: #fff; font-weight: 600; border-bottom: 1px solid var(--border); cursor: pointer; }
        
        /* AVIATOR GAME LAYER */
        #aviator-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5000; display: none; flex-direction: column;
        }
        .aviator-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; background: radial-gradient(circle, #2c0a0a 0%, #000 100%); }
        .multiplier { font-size: 4rem; font-weight: 900; color: #fff; z-index: 10; }
        .plane { font-size: 3rem; position: absolute; bottom: 20%; left: 10%; transition: all 0.1s linear; z-index: 5; }
        .aviator-controls { padding: 20px; background: #141a26; display: flex; gap: 10px; }
        .bet-btn { flex: 1; background: var(--neon-green); color: #000; border: none; padding: 20px; border-radius: 10px; font-weight: 900; font-size: 1.2rem; }
        .cashout-btn { flex: 1; background: #ffc107; color: #000; border: none; padding: 20px; border-radius: 10px; font-weight: 900; font-size: 1.2rem; display: none; }

        /* MAIN UI STYLES */
        header { background: #141a26; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .menu-trigger { font-size: 1.5rem; cursor: pointer; }
        .bal-box { background: #ffee00; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; }
        .match-row { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        .match-main { display: flex; align-items: center; margin-top: 5px; }
        .match-teams { flex: 2; display: flex; flex-direction: column; }
        .team-name { font-weight: 600; font-size: 0.95rem; }
        .odds-container { flex: 3; display: flex; gap: 8px; justify-content: flex-end; }
        .btn-odd { background: #222834; border: 1px solid var(--border); color: #fff; border-radius: 6px; width: 62px; height: 42px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleDash()"></div>

<div id="dashboard">
    <div class="dash-header">
        <span>PESA<span style="color:var(--neon-green)">CHAPCHAP</span></span>
        <span onclick="toggleDash()" style="cursor:pointer">✕</span>
    </div>
    <div style="overflow-y:auto; flex:1;">
        <div class="dash-item" onclick="toggleDash()">🏟️ Prematch</div>
        <div class="dash-item" onclick="toggleDash()">📡 Live Games</div>
        <div class="dash-item" onclick="openAviator()">🚀 Aviator <span style="background:var(--neon-red); font-size:0.6rem; padding:2px 5px; border-radius:5px;">HOT</span></div>
        <div class="dash-item">🎰 Casino</div>
    </div>
</div>

<div id="aviator-layer">
    <div style="padding:15px; display:flex; justify-content:space-between; align-items:center; background:#141a26;">
        <div style="font-weight:900; color:var(--neon-red)">AVIATOR</div>
        <div class="bal-box">KES <span id="av-bal">1000.00</span></div>
        <button onclick="closeAviator()" style="background:none; border:none; color:#fff; font-size:1.5rem;">✕</button>
    </div>
    <div class="aviator-screen">
        <div class="multiplier" id="mult-text">1.00x</div>
        <div class="plane" id="plane">✈️</div>
    </div>
    <div class="aviator-controls">
        <button class="bet-btn" id="bet-btn" onclick="startAviator()">BET (KES 100)</button>
        <button class="cashout-btn" id="cashout-btn" onclick="cashout()">CASHOUT</button>
    </div>
</div>

<header>
    <div class="menu-trigger" onclick="toggleDash()">☰</div>
    <div style="font-weight:900; font-style:italic;">PESA<span style="color:var(--neon-green)">CHAPCHAP</span></div>
    <div class="bal-box">KES <span id="main-bal">1000.00</span></div>
</header>

<div id="matchContainer"></div>

<script>
    let balance = 1000.00;
    let running = false;
    let currentMult = 1.00;
    let interval;

    function toggleDash() {
        const dash = document.getElementById('dashboard');
        const overlay = document.getElementById('overlay');
        dash.classList.toggle('active');
        overlay.style.display = dash.classList.contains('active') ? 'block' : 'none';
    }

    function openAviator() {
        toggleDash();
        document.getElementById('aviator-layer').style.display = 'flex';
        updateBalances();
    }

    function closeAviator() {
        document.getElementById('aviator-layer').style.display = 'none';
        running = false;
        clearInterval(interval);
    }

    function updateBalances() {
        document.getElementById('main-bal').innerText = balance.toFixed(2);
        document.getElementById('av-bal').innerText = balance.toFixed(2);
    }

    function startAviator() {
        if(balance < 100) return alert("Insufficient Balance");
        balance -= 100;
        updateBalances();
        
        running = true;
        currentMult = 1.00;
        document.getElementById('bet-btn').style.display = 'none';
        document.getElementById('cashout-btn').style.display = 'block';
        
        const plane = document.getElementById('plane');
        const crashAt = (Math.random() * 5 + 1.1).toFixed(2);

        interval = setInterval(() => {
            currentMult += 0.01;
            document.getElementById('mult-text').innerText = currentMult.toFixed(2) + "x";
            
            // Move plane
            plane.style.bottom = (20 + (currentMult * 5)) + "%";
            plane.style.left = (10 + (currentMult * 8)) + "%";

            if(currentMult >= crashAt) {
                clearInterval(interval);
                running = false;
                document.getElementById('mult-text').style.color = "var(--neon-red)";
                document.getElementById('mult-text').innerText = "FLEW AWAY!";
                setTimeout(resetAviator, 2000);
            }
        }, 50);
    }

    function cashout() {
        if(!running) return;
        let win = 100 * currentMult;
        balance += win;
        clearInterval(interval);
        running = false;
        alert("You won KES " + win.toFixed(2));
        resetAviator();
        updateBalances();
    }

    function resetAviator() {
        clearInterval(interval);
        document.getElementById('mult-text').style.color = "#fff";
        document.getElementById('mult-text').innerText = "1.00x";
        document.getElementById('bet-btn').style.display = 'block';
        document.getElementById('cashout-btn').style.display = 'none';
        document.getElementById('plane').style.bottom = "20%";
        document.getElementById('plane').style.left = "10%";
    }

    function renderMatches() {
        const container = document.getElementById('matchContainer');
        const games = [
            { t1: 'Kenya', t2: 'Tanzania', o1: '2.10', oX: '3.10', o2: '3.40' },
            { t1: 'Egypt', t2: 'Nigeria', o1: '1.95', oX: '3.20', o2: '4.20' }
        ];
        games.forEach(g => {
            container.innerHTML += `
                <div class="match-row">
                    <div style="font-size:0.65rem; color:var(--text-muted);">Soccer • Live Now</div>
                    <div class="match-main">
                        <div class="match-teams"><span class="team-name">${g.t1}</span><span class="team-name">${g.t2}</span></div>
                        <div class="odds-container">
                            <div class="btn-odd">${g.o1}</div><div class="btn-odd">${g.oX}</div><div class="btn-odd">${g.o2}</div>
                        </div>
                    </div>
                </div>`;
        });
    }
    renderMatches();
</script>
</body>
</html>
