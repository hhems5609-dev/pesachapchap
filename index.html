<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesa ChapChap | Full Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0d121c;
            --bg-card: #141a26;
            --neon-green: #00e676;
            --border: #1f2533;
            --text-muted: #8e8fa3;
            --dash-width: 280px;
        }

        body { background: var(--bg-body); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* SIDE DASHBOARD */
        #dashboard {
            position: fixed; top: 0; left: calc(-1 * var(--dash-width)); width: var(--dash-width);
            height: 100%; background: #1c222e; z-index: 3000; transition: 0.3s cubic-bezier(0, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        #dashboard.active { left: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 2500; }

        .dash-header { padding: 20px; font-weight: 900; border-bottom: 1px solid var(--border); font-size: 1.2rem; }
        .dash-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; text-decoration: none; color: #fff; font-weight: 600; border-bottom: 1px solid var(--border); }
        .pref-section { padding: 20px; border-top: 1px solid var(--border); margin-top: auto; background: #141a26; }
        
        /* TOGGLE SWITCH */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--neon-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* MAIN UI */
        header { 
            background: #141a26; padding: 12px 15px; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; 
        }
        .menu-trigger { font-size: 1.5rem; cursor: pointer; padding-right: 10px; }
        .bal-box { background: #ffee00; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; }

        .sports-nav { display: flex; overflow-x: auto; padding: 10px; gap: 20px; background: #141a26; border-bottom: 1px solid var(--border); }
        .sport-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; min-width: 55px; color: var(--text-muted); }
        .sport-item.active { color: var(--neon-green); }

        .banner { background: linear-gradient(90deg, #00e676, #b2ff59); margin: 12px; padding: 15px; border-radius: 10px; color: #000; text-align: center; font-weight: 900; font-size: 0.85rem; }

        .match-row { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        .match-main { display: flex; align-items: center; margin-top: 5px; }
        .match-teams { flex: 2; display: flex; flex-direction: column; }
        .team-name { font-weight: 600; font-size: 0.95rem; }
        .odds-container { flex: 3; display: flex; gap: 8px; justify-content: flex-end; }
        .btn-odd { background: #222834; border: 1px solid var(--border); color: #fff; border-radius: 6px; width: 62px; height: 42px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleDash()"></div>

<div id="dashboard">
    <div class="dash-header">PESA<span style="color:var(--neon-green)">CHAPCHAP</span></div>
    <div style="overflow-y:auto; flex:1;">
        <a href="#" class="dash-item">🏠 Prematch</a>
        <a href="#" class="dash-item">📡 Live Games</a>
        <a href="#" class="dash-item">🚀 Aviator</a>
        <a href="#" class="dash-item">🎰 Casino</a>
    </div>
    <div class="pref-section">
        <div style="font-size:0.7rem; color:var(--text-muted); margin-bottom:15px;">PREFERENCES</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span>Data Saver</span>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>Dark Mode</span>
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>
</div>

<header>
    <div class="menu-trigger" onclick="toggleDash()">☰</div>
    <div style="font-weight:900; font-style:italic;">PESA<span style="color:var(--neon-green)">CHAPCHAP</span></div>
    <div class="bal-box">KES 0.00</div>
</header>

<div class="sports-nav">
    <div class="sport-item active">⚽<br>Soccer</div>
    <div class="sport-item">🚀<br>Aviator</div>
    <div class="sport-item">🏆<br>Jackpots</div>
</div>

<div class="banner">🏆 OMOKA NA MIDWEEK 15M JACKPOT!</div>

<div id="matchContainer"></div>

<script>
    function toggleDash() {
        const dash = document.getElementById('dashboard');
        const overlay = document.getElementById('overlay');
        dash.classList.toggle('active');
        overlay.style.display = dash.classList.contains('active') ? 'block' : 'none';
    }

    function renderMatches() {
        const container = document.getElementById('matchContainer');
        const games = [
            { t1: 'Arsenal', t2: 'Liverpool', o1: '2.45', oX: '3.30', o2: '2.80' },
            { t1: 'Man City', t2: 'Chelsea', o1: '1.55', oX: '4.20', o2: '5.60' }
        ];
        games.forEach(g => {
            container.innerHTML += `
                <div class="match-row">
                    <div style="font-size:0.65rem; color:var(--text-muted);">Soccer • Today, 20:00</div>
                    <div class="match-main">
                        <div class="match-teams"><span class="team-name">${g.t1}</span><span class="team-name">${g.t2}</span></div>
                        <div class="odds-container">
                            <div class="btn-odd">${g.o1}</div><div class="btn-odd">${g.oX}</div><div class="btn-odd">${g.o2}</div>
                        </div>
                    </div>
                </div>`;
        });
    }
    renderMatches();
</script>
</body>
</html>
