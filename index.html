<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesa ChapChap | Sports</title>
    <style>
        :root { --bg: #0d121c; --primary: #ffee00; --text: #fff; --card: #1a1e29; --border: #242a36; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* Header & Balance */
        header { background: #0b0f16; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.2rem; }
        .logo span { color: var(--primary); }
        .bal { background: var(--primary); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        /* Match Styles */
        .match-card { padding: 15px; border-bottom: 1px solid var(--border); }
        .match-info { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .teams { font-weight: bold; font-size: 1rem; margin-bottom: 10px; line-height: 1.4; }
        .odds-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        /* The Betting Button */
        .odd-btn { 
            background: #242a36; border: 1px solid var(--border); color: white; 
            padding: 10px; border-radius: 8px; text-align: center; cursor: pointer;
            transition: 0.2s;
        }
        .odd-btn:active { background: var(--primary); color: #000; transform: scale(0.95); }
        .odd-btn.selected { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Floating Betslip */
        #betslip { 
            position: fixed; bottom: 70px; left: 5%; width: 90%; 
            background: #ffee00; color: #000; padding: 15px; 
            border-radius: 10px; display: none; flex-direction: column; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5); z-index: 1000;
        }
        .slip-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }
        .bet-input { width: 100%; padding: 10px; border: 1px solid #000; border-radius: 5px; margin-bottom: 10px; font-size: 1rem; }
        .place-btn { background: #000; color: #fff; border: none; padding: 12px; border-radius: 5px; font-weight: bold; width: 100%; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: #0b0f16; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); }
        .nav-item { color: #888; text-decoration: none; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo">PESA<span>CHAPCHAP</span></div>
    <div class="bal">KES <span id="displayBal">0.00</span></div>
</header>

<div id="matchList">
    </div>

<div id="betslip">
    <div class="slip-row">
        <span id="slipMatch">Match Name</span>
        <span id="slipOdd">0.00</span>
    </div>
    <input type="number" id="stake" class="bet-input" placeholder="Enter Stake (Min 10)" oninput="updateWin()">
    <div class="slip-row">
        <span>Possible Win:</span>
        <span id="posWin">0.00</span>
    </div>
    <button class="place-btn" onclick="placeBet()">PLACE BET</button>
</div>

<div class="nav">
    <a href="/" class="nav-item">🏠<br>Home</a>
    <a href="/play" class="nav-item">🚀<br>Aviator</a>
    <a href="/deposit" class="nav-item">💳<br>Deposit</a>
    <a href="/admin" class="nav-item">👤<br>Account</a>
</div>

<script>
    let currentBalance = parseFloat(localStorage.getItem('pesa_balance') || 0);
    document.getElementById('displayBal').innerText = currentBalance.toFixed(2);

    const matches = [
        { id: 1, teams: "Chelsea vs Liverpool", time: "Today, 20:00", odds: [2.50, 3.20, 2.80] },
        { id: 2, teams: "Arsenal vs Man City", time: "Today, 22:30", odds: [3.10, 3.50, 2.10] },
        { id: 3, teams: "Real Madrid vs Barcelona", time: "Tomorrow, 21:00", odds: [1.90, 3.80, 4.20] },
        { id: 4, teams: "Gor Mahia vs AFC Leopards", time: "Sunday, 15:00", odds: [1.75, 2.90, 5.00] },
        { id: 5, teams: "Bayern vs Dortmund", time: "Tomorrow, 19:30", odds: [1.50, 4.50, 6.00] }
    ];

    let selectedOdd = 0;
    let selectedMatch = "";

    function loadMatches() {
        const container = document.getElementById('matchList');
        matches.forEach(m => {
            container.innerHTML += `
                <div class="match-card">
                    <div class="match-info">⚽ International • ${m.time}</div>
                    <div class="match-teams">${m.teams.replace(' vs ', '<br>')}</div>
                    <div class="odds-row">
                        <div class="odd-btn" onclick="openSlip('${m.teams}', ${m.odds[0]}, this)">${m.odds[0]}</div>
                        <div class="odd-btn" onclick="openSlip('${m.teams}', ${m.odds[1]}, this)">${m.odds[1]}</div>
                        <div class="odd-btn" onclick="openSlip('${m.teams}', ${m.odds[2]}, this)">${m.odds[2]}</div>
                    </div>
                </div>`;
        });
    }

    function openSlip(teams, odd, element) {
        // Deselect others
        document.querySelectorAll('.odd-btn').forEach(btn => btn.classList.remove('selected'));
        element.classList.add('selected');
        
        selectedOdd = odd;
        selectedMatch = teams;
        document.getElementById('slipMatch').innerText = teams;
        document.getElementById('slipOdd').innerText = odd;
        document.getElementById('betslip').style.display = 'flex';
        updateWin();
    }

    function updateWin() {
        const stake = document.getElementById('stake').value || 0;
        document.getElementById('posWin').innerText = (stake * selectedOdd).toFixed(2);
    }

    function placeBet() {
        const stake = parseFloat(document.getElementById('stake').value);
        if (stake > currentBalance) return alert("Insufficient Funds! Please Deposit.");
        if (stake < 10) return alert("Minimum bet is KES 10");

        currentBalance -= stake;
        localStorage.setItem('pesa_balance', currentBalance);
        document.getElementById('displayBal').innerText = currentBalance.toFixed(2);
        
        alert("✔️ Bet Placed Successfully! Good luck.");
        document.getElementById('betslip').style.display = 'none';
        document.querySelectorAll('.odd-btn').forEach(btn => btn.classList.remove('selected'));
    }

    loadMatches();
</script>

</body>
</html>
