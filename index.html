<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesa ChapChap | Home</title>
    <style>
        :root {
            --bg-deep: #0d121c;
            --bg-card: #1a1e29;
            --neon-green: #00e676;
            --neon-purple: #9c27b0;
            --live-red: #ff3d00;
            --text-main: #ffffff;
            --text-muted: #8e8fa3;
            --border: #242a36;
        }

        body { background: var(--bg-deep); color: var(--text-main); font-family: sans-serif; margin: 0; padding-bottom: 90px; }

        /* HEADER */
        header { background: #0b0f16; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.1rem; color: var(--neon-green); }
        .bal-box { background: #ffee00; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; }

        /* TOP SCROLLING MENU */
        .top-menu { background: #0b0f16; display: flex; overflow-x: auto; padding: 10px; gap: 15px; border-bottom: 1px solid var(--border); }
        .top-menu::-webkit-scrollbar { display: none; }
        .menu-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; text-decoration: none; color: var(--text-muted); font-size: 0.7rem; font-weight: bold; }
        .menu-item.active { color: var(--neon-green); }
        .menu-icon { font-size: 1.4rem; margin-bottom: 4px; }

        /* BANNER */
        .hero-banner { background: linear-gradient(135deg, #00c853, #6200ea); margin: 15px; padding: 25px; border-radius: 12px; text-align: center; font-weight: 900; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* POPULAR GAMES GRID */
        .section-title { padding: 0 15px; font-size: 0.9rem; font-weight: bold; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .game-card { background: var(--bg-card); border-radius: 15px; border: 1px solid var(--border); text-decoration: none; color: white; text-align: center; overflow: hidden; position: relative; }
        .game-img { font-size: 2.5rem; padding: 25px 0; background: rgba(255,255,255,0.03); }
        .game-info { padding: 10px; font-weight: bold; font-size: 0.85rem; background: #242a36; }

        /* LIVE MATCH PREVIEW (Inline Sports) */
        .live-preview { background: var(--bg-card); margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .live-tag { color: var(--live-red); font-size: 0.7rem; font-weight: 800; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* BOTTOM NAV */
        .bottom-nav { background: #0b0f16; border-top: 1px solid var(--border); position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-link { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 0.7rem; font-weight: bold; }
        .nav-link.active { color: var(--neon-green); }
    </style>
</head>
<body>

<header>
    <div class="logo">PESA CHAPCHAP</div>
    <div class="bal-box">KES <span id="userBal">0.00</span></div>
</header>

<div class="top-menu">
    <a href="/" class="menu-item active"><span class="menu-icon">⚽</span>Soccer</a>
    <a href="/play" class="menu-item"><span class="menu-icon">🚀</span>Aviator</a>
    <a href="#" class="menu-item"><span class="menu-icon">🏆</span>Jackpot</a>
    <a href="#" class="menu-item"><span class="menu-icon">🎲</span>Casino</a>
    <a href="#" class="menu-item"><span class="menu-icon">🏇</span>Virtuals</a>
</div>

<div class="hero-banner">50% WELCOME BONUS ON FIRST DEPOSIT!</div>

<div class="section-title">Popular Games</div>
<div class="game-grid">
    <a href="/play" class="game-card">
        <div class="game-img">🚀</div>
        <div class="game-info">Aviator / Crash</div>
    </a>
    <a href="/sports" class="game-card">
        <div class="game-img">⚽</div>
        <div class="game-info">Sports Betting</div>
    </a>
    <a href="#" class="game-card" onclick="alert('Casino coming soon!')">
        <div class="game-img" style="filter: grayscale(1);">🎰</div>
        <div class="game-info">Casino Slots</div>
    </a>
    <a href="#" class="game-card" onclick="alert('Virtuals coming soon!')">
        <div class="game-img" style="filter: grayscale(1);">🏇</div>
        <div class="game-info">Virtual Racing</div>
    </a>
</div>

<div class="section-title">Live Highlight</div>
<div class="live-preview">
    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
        <span class="live-tag">● LIVE 84'</span>
        <span style="font-size:0.7rem; color:var(--text-muted);">Premier League</span>
    </div>
    <div style="font-weight:bold;">Arsenal 2 - 1 Man Utd</div>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:10px;">
        <div style="background:#242a36; padding:8px; border-radius:5px; text-align:center; font-size:0.8rem;">1.15</div>
        <div style="background:#242a36; padding:8px; border-radius:5px; text-align:center; font-size:0.8rem;">4.20</div>
        <div style="background:#242a36; padding:8px; border-radius:5px; text-align:center; font-size:0.8rem;">18.5</div>
    </div>
</div>

<div class="bottom-nav">
    <a href="/" class="nav-link active">🏠<br>Home</a>
    <a href="/play" class="nav-link">🚀<br>Crash</a>
    <a href="/deposit" class="nav-link">💳<br>Deposit</a>
    <a href="/admin" class="nav-link">👤<br>Account</a>
</div>

<script>
    let rawBal = localStorage.getItem('pesa_balance');
    let currentBalance = (rawBal === null || rawBal === "NaN") ? 0.00 : parseFloat(rawBal);
    document.getElementById('userBal').innerText = currentBalance.toFixed(2);
</script>
</body>
</html>
